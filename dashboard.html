<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Eksekutif - Laporan KPI</title>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>

    <style>
        /* Styling Khusus Tab Dashboard */
        .tab-container { display: flex; gap: 10px; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
        .tab-btn { background: none; border: none; padding: 10px 20px; cursor: pointer; font-weight: 600; color: var(--text-muted); border-bottom: 3px solid transparent; margin-bottom: -2px; font-size: 15px; }
        .tab-btn:hover { color: var(--primary); }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Kalender */
        #calendar { background: white; padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); }
        .fc-event { cursor: pointer; }
    </style>
</head>
<body>

    <div style="background-color: var(--primary); color: white; padding: 15px;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 0;">
            <h2 style="margin: 0;">Dashboard Manajemen KPI</h2>
            <button onclick="logout()" class="btn-primary" style="background: transparent; border: 1px solid white;">Logout</button>
        </div>
    </div>

    <div class="container">
        
        <div class="tab-container">
            <button class="tab-btn active" onclick="openTab('tab-triwulan', this)">Manajemen Triwulan</button>
            <button class="tab-btn" onclick="openTab('tab-kanban', this)">Kanban Board</button>
            <button class="tab-btn" onclick="openTab('tab-kalender', this)">Kalender Kegiatan</button>
        </div>

        <div id="tab-triwulan" class="tab-content active">
            <div class="card">
                <h3 style="margin-top:0;">Daftar Triwulan</h3>
                <div id="triwulanList">Loading data...</div>
                
                <hr style="border: 0; border-top: 1px solid var(--border); margin: 30px 0;">
                
                <h4 style="color: var(--primary);">+ Tambah Triwulan Baru</h4>
                <form id="formTriwulan">
                    <input type="text" id="namaTriwulan" placeholder="Contoh: Triwulan I" required>
                    <div style="display: flex; gap: 15px;">
                        <input type="number" id="tahunTriwulan" placeholder="Tahun (Contoh: 2026)" style="flex: 1;" required>
                        <input type="number" id="periodeTriwulan" placeholder="Periode (1-4)" min="1" max="4" style="flex: 1;" required>
                    </div>
                    <button type="submit" class="btn-primary">Simpan Triwulan</button>
                </form>
            </div>
        </div>

        <div id="tab-kanban" class="tab-content">
            <div class="card" style="background: transparent; border: none; box-shadow: none; padding: 0;">
                <p style="color: var(--text-muted); margin-top: 0;">*Tarik dan lepas (drag-and-drop) kartu kegiatan untuk mengubah statusnya secara otomatis.</p>
                <div class="kanban-board" id="kanbanContainer">
                    <div class="kanban-col" data-status="Persiapan">
                        <h4>Persiapan</h4><div class="kanban-items" id="col-Persiapan"></div>
                    </div>
                    <div class="kanban-col" data-status="Pelaksanaan">
                        <h4>Pelaksanaan</h4><div class="kanban-items" id="col-Pelaksanaan"></div>
                    </div>
                    <div class="kanban-col" data-status="Evaluasi">
                        <h4>Evaluasi</h4><div class="kanban-items" id="col-Evaluasi"></div>
                    </div>
                    <div class="kanban-col" data-status="Selesai">
                        <h4>Selesai</h4><div class="kanban-items" id="col-Selesai"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-kalender" class="tab-content">
            <div id="calendar"></div>
        </div>

    </div>

    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
