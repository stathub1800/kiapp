<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Laporan KPI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div style="background-color: var(--primary); color: white; padding: 15px;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 0;">
            <h2 style="margin: 0;">Admin KPI</h2>
            <button onclick="logout()" style="background: transparent; color: white; border: 1px solid white; padding: 5px 10px; cursor: pointer;">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h3>Daftar Triwulan</h3>
            <div id="triwulanList">Loading data...</div>
            <hr style="margin: 20px 0;">
            <h4>Tambah Triwulan Baru</h4>
            <form id="formTriwulan">
                <input type="text" id="namaTriwulan" placeholder="Contoh: Triwulan I" required>
                <input type="number" id="tahunTriwulan" placeholder="Tahun (Contoh: 2025)" required>
                <input type="number" id="periodeTriwulan" placeholder="Periode (1-4)" min="1" max="4" required>
                <button type="submit" class="btn-primary">Tambah Triwulan</button>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
