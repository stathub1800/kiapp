<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer Dokumen - KPI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .watermark { background-color: var(--secondary); color: white; padding: 10px; text-align: center; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="watermark">BUKTI DUKUNG KPI – HANYA LIHAT</div>

    <div class="container" id="viewerContent">
        <div style="text-align: center; padding: 50px;">Memuat dokumen... mohon tunggu.</div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script>
        // Logika Pengambilan Data Berdasarkan Token
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const viewerContent = document.getElementById('viewerContent');

        async function loadViewerData() {
            if (!token) {
                viewerContent.innerHTML = `<div class="card" style="text-align:center; color: var(--danger);"><h3>Token tidak valid atau tidak ditemukan.</h3></div>`;
                return;
            }

            // Cari kegiatan berdasarkan share_token
            const { data: kegiatanData, error: kegiatanError } = await supabase
                .from('kegiatan').select('*').eq('share_token', token).single();

            if (kegiatanError || !kegiatanData) {
                viewerContent.innerHTML = `<div class="card" style="text-align:center; color: var(--danger);"><h3>Laporan tidak ditemukan / Link sudah kadaluarsa.</h3></div>`;
                return;
            }

            // Ambil Bukti Dukung
            const { data: buktiData } = await supabase
                .from('bukti_dukung').select('*').eq('kegiatan_id', kegiatanData.id).order('created_at', { ascending: true });

            // Susun Tampilan UI
            let html = `
                <div class="card" style="border-top: 4px solid var(--primary);">
                    <h2 style="margin-top: 0; color: var(--primary);">${kegiatanData.nama_kegiatan}</h2>
                    <p><strong>Waktu Pelaksanaan:</strong> ${kegiatanData.waktu_pelaksanaan}</p>
                    <p><strong>Rencana Kerja:</strong> ${kegiatanData.rencana_kerja_kipapp}</p>
                    <p><strong>Deskripsi:</strong><br>${kegiatanData.deskripsi || '-'}</p>
                </div>
                <h3 style="margin-top: 30px;">Dokumen Bukti Dukung</h3>
            `;

            if (!buktiData || buktiData.length === 0) {
                html += `<div class="card"><p>Tidak ada dokumen yang dilampirkan pada laporan ini.</p></div>`;
            } else {
                buktiData.forEach((file, index) => {
                    let preview = '';
                    if (file.file_type && file.file_type.includes('image')) {
                        preview = `<img src="${file.file_url}" style="max-width: 100%; border-radius: 8px; margin-top: 15px;">`;
                    } else if (file.file_type === 'application/pdf') {
                        preview = `<iframe src="${file.file_url}" width="100%" height="500px" style="border:1px solid #ccc; border-radius: 8px; margin-top: 15px;"></iframe>`;
                    } else {
                        preview = `<a href="${file.file_url}" target="_blank" class="btn-primary" style="display: inline-block; margin-top: 15px; text-decoration: none;">Unduh ${file.file_name}</a>`;
                    }

                    html += `
                        <div class="card" style="margin-bottom: 20px;">
                            <div style="background: var(--background); padding: 10px; border-radius: 4px;"><strong>Lampiran ${index + 1}:</strong> ${file.file_name}</div>
                            ${preview}
                        </div>
                    `;
                });
            }
            viewerContent.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', loadViewerData);
    </script>
</body>
</html>
