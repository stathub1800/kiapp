<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Laporan Kegiatan KPI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="justify-content: center; align-items: center;">

    <div class="card" style="max-width: 400px; width: 100%;">
        <h2 style="text-align: center; color: var(--primary);">Login Sistem KPI</h2>
        <form id="loginForm">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="admin@kpi.local">
            
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="********">
            
            <button type="submit" class="btn-primary" style="width: 100%;">Masuk</button>
        </form>
        <p id="errorMessage" style="color: var(--danger); text-align: center; display: none;"></p>
    </div>

    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
