<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Superapp KPI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="login-page">
    <div class="login-card">

        <div class="login-logo">
            <h1>Superapp KPI</h1>
            <p>Sistem Manajemen Kinerja Personal<br>BPS Provinsi Lampung</p>
        </div>

        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="admin@example.com" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary w-full" style="justify-content:center; padding:12px;">
                Masuk ke Dashboard
            </button>
        </form>

        <p id="errorMessage" style="color:var(--danger); text-align:center; font-size:13px; margin-top:14px; display:none;"></p>

        <p style="text-align:center; font-size:11px; color:var(--text-muted); margin-top:24px;">
            Sesi otomatis berakhir saat browser ditutup.<br>
            Auto-logout setelah 30 menit tidak aktif.
        </p>

    </div>
</div>

<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
